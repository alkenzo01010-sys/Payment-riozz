<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Modern • DANA & QRIS</title>
  <!-- Font & Ikon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #f6f9fc 0%, #eef2f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .payment-card {
      max-width: 520px;
      width: 100%;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 40px;
      box-shadow: 0 25px 45px -12px rgba(0,30,50,0.25), 0 4px 12px rgba(0,0,0,0.05);
      padding: 2rem 1.8rem;
      border: 1px solid rgba(255,255,255,0.5);
      transition: all 0.2s ease;
    }

    .payment-card:hover {
      box-shadow: 0 30px 55px -15px rgba(0,40,70,0.3);
    }

    h2 {
      font-size: 1.9rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #0b2b3b;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0.3rem;
    }

    h2 i {
      color: #00a6b4;
      font-size: 2rem;
    }

    .subhead {
      color: #456f7c;
      font-weight: 400;
      font-size: 0.98rem;
      margin-bottom: 2rem;
      border-left: 4px solid #00bbc9;
      padding-left: 16px;
      background: #d3eef3a0;
      border-radius: 0 16px 16px 0;
      line-height: 1.4;
    }

    /* metode wrapper */
    .method-container {
      display: flex;
      flex-direction: column;
      gap: 28px;
      margin: 30px 0 25px;
    }

    .method-item {
      background: white;
      border-radius: 30px;
      padding: 1.5rem 1.8rem;
      box-shadow: 0 8px 18px -8px rgba(0,40,50,0.12);
      border: 1px solid rgba(0,160,180,0.15);
      transition: all 0.2s;
    }

    .method-item:hover {
      border-color: #1ba5b8;
      box-shadow: 0 14px 24px -12px #1ba5b850;
    }

    .method-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .method-header i {
      font-size: 2.2rem;
      width: 44px;
      color: #058396;
    }

    .method-header h3 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #113946;
      letter-spacing: -0.3px;
    }

    .detail-payment {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-left: 8px;
    }

    .dana-field {
      background: #f1fafc;
      border-radius: 26px;
      padding: 16px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px dashed #29becd;
      font-size: 1.15rem;
    }

    .dana-number {
      font-weight: 700;
      color: #075e6b;
      letter-spacing: 0.5px;
      background: white;
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 1.25rem;
      border: 1px solid #b0e4eb;
    }

    .copy-btn {
      background: none;
      border: none;
      color: #09818f;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 50%;
      transition: 0.2s;
      background: white;
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
    }

    .copy-btn:hover {
      background: #dff3f7;
      color: #015761;
      transform: scale(1.02);
    }

    /* QRIS section dengan gambar dari API qrserver */
    .qris-wrapper {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 22px;
      margin-top: 6px;
    }

    .qris-thumb {
      background: #ffffff;
      border-radius: 30px;
      padding: 16px 16px 12px 16px;
      box-shadow: 0 8px 18px rgba(0,110,120,0.08);
      text-align: center;
      border: 1px solid #d0edf2;
      flex: 0 0 130px;
    }

    .qris-thumb img {
      width: 100%;
      max-width: 110px;
      border-radius: 12px;
      display: block;
      margin: 0 auto 6px;
      background: white;
    }

    .qris-label {
      font-size: 0.75rem;
      color: #35848f;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .qris-link {
      flex: 1;
      min-width: 170px;
    }

    .qris-link a {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #102e36;
      color: white;
      text-decoration: none;
      padding: 16px 22px;
      border-radius: 48px;
      font-weight: 500;
      font-size: 1.1rem;
      transition: 0.2s;
      box-shadow: 0 8px 18px #102e3630;
      width: 100%;
      justify-content: center;
      border: 1px solid #266e7c;
    }

    .qris-link a:hover {
      background: #154954;
      transform: translateY(-3px);
      box-shadow: 0 18px 25px -8px #0a404b;
    }

    .qris-link i {
      font-size: 1.5rem;
    }

    /* teks marah-marah */
    .warning-proof {
      background: #0b1f26;
      border-radius: 40px;
      padding: 1.4rem 1.8rem;
      margin-top: 30px;
      color: white;
      font-weight: 600;
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border: 2px solid #f65d5d;
      box-shadow: 0 10px 0 #971e1e;
      transition: 0.1s linear;
      word-break: break-word;
    }

    .warning-proof i {
      font-size: 2.3rem;
      color: #ff9494;
      filter: drop-shadow(0 3px 0 #a10000);
    }

    .warning-proof span {
      background: #ffdcdc;
      color: #ad1f1f;
      padding: 5px 18px;
      border-radius: 60px;
      font-size: 1.3rem;
      font-weight: 800;
    }

    .footer-note {
      text-align: center;
      margin-top: 18px;
      color: #7b9ba8;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .footer-note i {
      color: #d44f4f;
    }

    /* tooltip copy */
    .copy-tooltip {
      position: relative;
    }
    .copy-tooltip .tooltip-text {
      visibility: hidden;
      background: #174a55;
      color: white;
      font-size: 0.75rem;
      padding: 6px 10px;
      border-radius: 40px;
      position: absolute;
      bottom: 130%;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      opacity: 0;
      transition: 0.2s;
      box-shadow: 0 4px 8px black(0,0,0,0.1);
      pointer-events: none;
      font-weight: 400;
      letter-spacing: 0.3px;
    }
    .copy-tooltip:hover .tooltip-text {
      visibility: visible;
      opacity: 1;
    }

    /* responsif */
    @media (max-width: 460px) {
      .payment-card { padding: 1.5rem; }
      .dana-field { flex-wrap: wrap; gap: 15px; justify-content: center; }
      .dana-number { font-size: 1rem; }
      .qris-wrapper { justify-content: center; }
      .warning-proof { font-size: 1.2rem; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="payment-card">
    <h2>
      <i class="fas fa-bolt"></i> Bayar Cepat
    </h2>
    <div class="subhead">
      <i class="fas fa-shield-alt" style="margin-right: 8px;"></i>Pilih metode, transfer langsung, lalu kirim bukti.
    </div>

    <!-- metode pembayaran DANA & QRIS -->
    <div class="method-container">
      <!-- DANA -->
      <div class="method-item">
        <div class="method-header">
          <i class="fas fa-wallet"></i>
          <h3>DANA</h3>
        </div>
        <div class="detail-payment">
          <div class="dana-field">
            <span class="dana-number" id="dana-number">0856 4933 3764</span>
            <button class="copy-btn copy-tooltip" id="copyDanaBtn" onclick="copyDana()">
              <i class="far fa-copy"></i>
              <span class="tooltip-text">salin nomor</span>
            </button>
          </div>
          <div style="font-size: 0.95rem; color: #2f6c7a; display: flex; gap: 8px; align-items: center;">
            <i class="fas fa-check-circle" style="color: #02a1b3;"></i> a.n. TOKO GAUL
          </div>
        </div>
      </div>

      <!-- QRIS - DIUBAH sesuai file: Warung Yosssturee Wk33764, ukuran dan bentuk QR tetap -->
      <div class="method-item">
        <div class="method-header">
          <i class="fas fa-qrcode"></i>
          <h3>QRIS</h3>
        </div>
        <div class="qris-wrapper">
          <!-- thumbnail QR dari API qrserver dengan data = "Warung Yosssturee Wk33764" persis dari gambar -->
          <div class="qris-thumb">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=Warung Yosssturee Wk33764" 
                 alt="QRIS Warung Yosssturee Wk33764"
                 srcset="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=Warung Yosssturee Wk33764 2x">
            <div class="qris-label">scan atau klik</div>
          </div>
          <div class="qris-link">
            <!-- tautan mengarah ke gambar QR ukuran besar (600x600) dengan data yang sama, ukuran tetap proporsional -->
            <a href="https://api.qrserver.com/v1/create-qr-code/?size=600x600&data=Warung Yosssturee Wk33764" target="_blank" rel="noopener">
              <i class="fas fa-camera"></i> 
              <span>lihat QRIS</span>
              <i class="fas fa-external-link-alt" style="font-size: 0.9rem; opacity: 0.8;"></i>
            </a>
          </div>
        </div>
        <p style="margin-top: 18px; font-size: 0.9rem; background: #e3f4f7; padding: 8px 16px; border-radius: 30px; color: #0d4b56; word-break: break-all;">
          <i class="fas fa-qrcode"></i>  data: "Warung Yosssturee Wk33764" — QR via api.qrserver.com
        </p>
      </div>
    </div>

    <!-- peringatan + teks marah sesuai permintaan -->
    <div class="warning-proof">
      <i class="fas fa-skull-crossbones"></i>
      <span>*ss bkti tf woe 🤬*</span>
      <i class="fas fa-skull-crossbones"></i>
    </div>

    <!-- reminder kecil -->
    <div class="footer-note">
      <i class="fas fa-image"></i> screenshot bukti transfer lalu kirim ke admin
      <i class="fas fa-angry"></i>
    </div>
  </div>

  <!-- fungsi copy sederhana -->
  <script>
    function copyDana() {
      // ambil nomor tanpa spasi
      const danaText = "085649333764";
      navigator.clipboard.writeText(danaText).then(() => {
        const btn = document.getElementById('copyDanaBtn');
        const originalIcon = btn.innerHTML;
        // feedback cepat
        btn.innerHTML = `<i class="fas fa-check"></i><span class="tooltip-text">tersalin!</span>`;
        setTimeout(() => {
          btn.innerHTML = `<i class="far fa-copy"></i><span class="tooltip-text">salin nomor</span>`;
        }, 1800);
      }).catch(err => {
        alert('Gagal menyalin, silakan salin manual: 085649333764');
      });
    }
  </script>

  <!-- cadangan jika tombol gagal karena inline onclick (tetap pakai) 
       tapi modern pakai event listener lebih baik, kita selaraskan -->
  <script>
    (function() {
      // pastikan tombol juga bisa dengan listener, dukung copy
      const copyBtn = document.getElementById('copyDanaBtn');
      if (copyBtn) {
        copyBtn.addEventListener('click', function(e) {
          e.preventDefault();
          copyDana();
        });
      }

      // tambin protective jika ada multiple
      const danaDiv = document.querySelector('.dana-field .dana-number');
      if (danaDiv) {
        // optional : tidak perlu
      }
    })();
  </script>

  <!-- deskripsi rapi: DANA dan QRIS sesuai permintaan, teks *ss bkti tf woe 🤬* ditampilkan besar -->
</body>
</html>
